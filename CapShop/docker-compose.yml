services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: capshop-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: ${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!}\" -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: capshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: capshop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  auth-service:
    build:
      context: .
      dockerfile: backend/Services/AuthService/CapShop.AuthService/Dockerfile
    container_name: capshop-auth-service
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CapShopAuthDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__Redis: redis:6379
      EmailSettings__SenderEmail: ${AUTH_SMTP_EMAIL:-change-me@example.com}
      EmailSettings__SenderPassword: ${AUTH_SMTP_PASSWORD:-change-me}
      EmailSettings__SmtpHost: ${AUTH_SMTP_HOST:-smtp.gmail.com}
      EmailSettings__SmtpPort: ${AUTH_SMTP_PORT:-587}
    ports:
      - "5001:8080"
    restart: on-failure

  catalog-service:
    build:
      context: .
      dockerfile: backend/Services/CatalogService/CapShop.CatalogService/Dockerfile
    container_name: capshop-catalog-service
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CapShopCatalogDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__Redis: redis:6379
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "5002:8080"
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: backend/Services/OrderService/CapShop.OrderService/Dockerfile
    container_name: capshop-order-service
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CapShopOrderDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__Redis: redis:6379
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "5003:8080"
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: backend/Services/NotificationService/CapShop.NotificationService/Dockerfile
    container_name: capshop-notification-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CapShopNotificationDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      EmailSettings__SenderEmail: ${NOTIFICATION_SMTP_EMAIL:-change-me@example.com}
      EmailSettings__SenderPassword: ${NOTIFICATION_SMTP_PASSWORD:-change-me}
      EmailSettings__SmtpHost: ${NOTIFICATION_SMTP_HOST:-smtp.gmail.com}
      EmailSettings__SmtpPort: ${NOTIFICATION_SMTP_PORT:-587}
    ports:
      - "5005:8080"
    restart: on-failure

  admin-service:
    build:
      context: .
      dockerfile: backend/Services/AdminService/CapShop.AdminService/Dockerfile
    container_name: capshop-admin-service
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CapShopAdminDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "5004:8080"
    restart: on-failure

  # ── Data Seeder (runs once, then exits) ──────────────────────────────────────
  dataseeder:
    build:
      context: .
      dockerfile: CapShop.DataSeeder/Dockerfile
    container_name: capshop-dataseeder
    depends_on:
      sqlserver:
        condition: service_healthy
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      admin-service:
        condition: service_started
    environment:
      ConnectionStrings__AuthConnection: Server=sqlserver,1433;Database=CapShopAuthDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__CatalogConnection: Server=sqlserver,1433;Database=CapShopCatalogDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__OrderConnection: Server=sqlserver,1433;Database=CapShopOrderDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__AdminConnection: Server=sqlserver,1433;Database=CapShopAdminDB;User Id=sa;Password=${SQL_SA_PASSWORD:-ChangeMe_SQL_Password_123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
    restart: "no"

  gateway:
    build:
      context: .
      dockerfile: backend/Gateway/CapShop.Gateway/Dockerfile
    container_name: capshop-gateway
    depends_on:
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
      admin-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GATEWAY_URL: /gateway
    container_name: capshop-frontend
    depends_on:
      - gateway
    ports:
      - "8080:80"
    restart: on-failure

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
